<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles (faint) -->
  <circle cx="720" cy="100" r="90"  fill="none" stroke="white" stroke-width="1" opacity="0.12"/>
  <circle cx="720" cy="100" r="60"  fill="none" stroke="white" stroke-width="1" opacity="0.12"/>
  <circle cx="720" cy="100" r="30"  fill="none" stroke="white" stroke-width="1" opacity="0.12"/>
  <line x1="720" y1="40"  x2="720" y2="160" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="720" y1="100" x2="657" y2="155" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="720" y1="100" x2="783" y2="155" stroke="white" stroke-width="1" opacity="0.15"/>

  <!-- Dove / peace icon (left) -->
  <circle cx="90" cy="100" r="48" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="90" y1="52"  x2="90" y2="148" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="90" y1="100" x2="56" y2="134" stroke="white" stroke-width="3" opacity="0.5"/>
  <line x1="90" y1="100" x2="124" y2="134" stroke="white" stroke-width="3" opacity="0.5"/>

  <!-- Title -->
  <text x="160" y="88" font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="bold" fill="white" letter-spacing="4">loven 🕊️</text>

  <!-- Subtitle -->
  <text x="162" y="122" font-family="Arial, Helvetica, sans-serif"
        font-size="16" fill="white" opacity="0.85" letter-spacing="1">
    WorldPeace-Lovdata-Kompendium
  </text>

  <!-- Tagline -->
  <text x="162" y="152" font-family="Arial, Helvetica, sans-serif"
        font-size="13" fill="white" opacity="0.65" font-style="italic">
    Making Norwegian law accessible for clean energy, clean water, and a harmonious society.
  </text>

  <!-- Badges -->
  <rect x="162" y="164" width="88" height="20" rx="4" fill="#26A69A"/>
  <text x="206" y="178" font-family="monospace" font-size="11" fill="white" text-anchor="middle">CC0 · Public Domain</text>

  <rect x="258" y="164" width="72" height="20" rx="4" fill="#1565C0"/>
  <text x="294" y="178" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Python 3.10+</text>

  <rect x="338" y="164" width="58" height="20" rx="4" fill="#E65100"/>
  <text x="367" y="178" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Jupyter</text>
</svg>
