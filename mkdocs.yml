site_name: loven 🕊️
site_description: WorldPeace-Lovdata-Kompendium – Norwegian law analysis toolkit
site_url: https://gizzzmo.github.io/loven/
repo_url: https://github.com/GizzZmo/loven
repo_name: GizzZmo/loven
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting_started.md
      - Notebook Guide: notebook_guide.md
  - Reference:
      - API Reference: api_reference.md
      - CLI Reference: cli_reference.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GizzZmo/loven
  generator: false

copyright: "CC0 1.0 Universal – Public Domain"
