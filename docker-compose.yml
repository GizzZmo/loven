# ---------------------------------------------------------------------------
# loven – Docker Compose configuration
# ---------------------------------------------------------------------------
# Start the full stack with:
#   docker compose up --build
#
# The Streamlit dashboard will be available at http://localhost:8501
# ---------------------------------------------------------------------------

services:
  loven:
    build:
      context: .
      dockerfile: Dockerfile
    image: loven:latest
    container_name: loven_dashboard
    ports:
      - "8501:8501"
    environment:
      # Override the Lovdata API base URL if you have a local mirror:
      # LOVDATA_BASE_URL: "http://your-mirror:8080"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Persist the disk cache between container restarts
      - loven_cache:/home/appuser/.loven_cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  loven_cache:
    driver: local
